name: Pull Request Validation

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: pr-validation-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  workflows:
    name: Workflow Validation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate GitHub Actions workflows
        uses: devops-actions/actionlint@v0.1.10

  documentation:
    name: Documentation Synchronization
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate managed documentation
        run: python scripts/ci/sync_docs.py --check

  backend:
    name: Backend Validation
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      APP_ENV: local
      APP_VERSION: ci-${{ github.sha }}
      DATABASE_URL: sqlite+pysqlite:////tmp/styleus-ci.db?check_same_thread=false
      SUPABASE_URL: https://styleus-ci.supabase.co
      SUPABASE_SERVICE_ROLE_KEY: styleus-ci-service-role
      SUPABASE_STORAGE_BUCKET: wardrobe-images
      LOCAL_AUTH_BYPASS: "true"
      RUN_MIGRATIONS_ON_START: "false"
      RUN_SEED_ON_START: "false"
      AI_JOB_POLL_INTERVAL_SECONDS: "0.1"
      LOKY_MAX_CPU_COUNT: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: services/api/pyproject.toml

      - name: Install backend dependencies
        working-directory: services/api
        run: |
          python -m pip install --upgrade pip setuptools
          python -m pip install -e ".[dev]"

      - name: Backend lint
        working-directory: services/api
        run: python -m ruff check .

      - name: Backend type check
        working-directory: services/api
        run: python -m mypy app

      - name: Backend tests
        working-directory: services/api
        run: python -m pytest -q

      - name: Backend startup verification
        run: python scripts/ci/verify_backend.py

  frontend:
    name: Frontend Validation
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      VITE_APP_ENV: local
      VITE_API_BASE_URL: http://127.0.0.1:8000
      VITE_SUPABASE_URL: ""
      VITE_SUPABASE_ANON_KEY: ""
      VITE_USE_LIVE_API_ITEMS: "false"
      VITE_USE_LIVE_API_UPLOAD: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install frontend dependencies
        working-directory: apps/web
        run: npm ci

      - name: Frontend lint
        working-directory: apps/web
        run: npm run lint

      - name: Frontend type check
        working-directory: apps/web
        run: npm run typecheck

      - name: Frontend tests
        working-directory: apps/web
        run: npm test

      - name: Frontend build verification
        working-directory: apps/web
        run: npm run build

  security:
    name: Security Checks
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      pull-requests: read
    env:
      SECRET_SCAN_REVIEW_GITHUB_TOKEN: ${{ secrets.SECRET_SCAN_REVIEW_GITHUB_TOKEN }}
      GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install frontend dependencies
        working-directory: apps/web
        run: npm ci

      - name: npm audit report
        id: npm_audit
        continue-on-error: true
        working-directory: apps/web
        run: |
          set +e
          npm audit --audit-level=high --json > ../npm-audit.json
          audit_status=$?
          if [ ! -s ../npm-audit.json ]; then
            echo "::warning::npm audit did not produce a JSON report (exit ${audit_status}); creating an empty report so the gate only fails on real findings."
            printf '{"auditReportVersion":2,"vulnerabilities":{},"metadata":{"vulnerabilities":{"info":0,"low":0,"moderate":0,"high":0,"critical":0,"total":0},"dependencies":{"prod":0,"dev":0,"optional":0,"peer":0,"peerOptional":0,"total":0}}}\n' > ../npm-audit.json
          fi
          echo "exit_code=${audit_status}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Fail on high or critical npm vulnerabilities
        run: python scripts/ci/check_npm_audit.py apps/npm-audit.json

      - name: Note npm audit execution issues
        if: steps.npm_audit.outputs.exit_code != '0' && steps.npm_audit.outputs.exit_code != '1'
        run: echo "::warning::npm audit exited with status ${{ steps.npm_audit.outputs.exit_code }}; the security gate only fails on real findings."

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: services/api/pyproject.toml

      - name: Install backend dependencies for security scans
        working-directory: services/api
        run: |
          python -m pip install --upgrade pip setuptools
          python -m pip install -e ".[dev,ai]"
          python -m pip install pip-audit

      - name: pip-audit report
        id: pip_audit
        continue-on-error: true
        working-directory: services/api
        env:
          XDG_CACHE_HOME: /tmp/pip-audit-cache
          PIP_AUDIT_CACHE_DIR: /tmp/pip-audit-cache
        run: |
          set +e
          python -m pip_audit --format json --output ../pip-audit.json
          audit_status=$?
          if [ ! -s ../pip-audit.json ]; then
            echo "::warning::pip-audit did not produce a JSON report (exit ${audit_status}); creating an empty report so the gate only fails on real findings."
            printf '{"dependencies":[]}\n' > ../pip-audit.json
          fi
          echo "exit_code=${audit_status}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Fail on Python vulnerabilities
        run: python scripts/ci/check_pip_audit.py services/pip-audit.json

      - name: Note pip-audit execution issues
        if: steps.pip_audit.outputs.exit_code != '0' && steps.pip_audit.outputs.exit_code != '1'
        run: echo "::warning::pip-audit exited with status ${{ steps.pip_audit.outputs.exit_code }}; severity gating used the generated fallback report."

      - name: Dependency review
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

      - name: Secret detection
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITLEAKS_LICENSE: ${{ env.GITLEAKS_LICENSE }}

      - name: GitHub secret-scanning review
        if: github.event_name == 'pull_request' && env.SECRET_SCAN_REVIEW_GITHUB_TOKEN != ''
        uses: advanced-security/secret-scanning-review-action@v1
        with:
          token: ${{ env.SECRET_SCAN_REVIEW_GITHUB_TOKEN }}
          fail-on-alert: true
          disable-pr-comment: true

      - name: GitHub secret-scanning review not configured
        if: github.event_name == 'pull_request' && env.SECRET_SCAN_REVIEW_GITHUB_TOKEN == ''
        run: |
          echo "GitHub secret-scanning review skipped."
          echo "Set SECRET_SCAN_REVIEW_GITHUB_TOKEN to enable alert-based PR checks."
