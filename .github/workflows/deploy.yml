name: Deployment Verification

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  DEPLOY_HEALTHCHECK_URL: ${{ vars.DEPLOY_HEALTHCHECK_URL != '' && vars.DEPLOY_HEALTHCHECK_URL || 'https://styleus-api.onrender.com/health' }}
  DEPLOY_INITIAL_WAIT_SECONDS: ${{ vars.DEPLOY_INITIAL_WAIT_SECONDS != '' && vars.DEPLOY_INITIAL_WAIT_SECONDS || '90' }}
  DEPLOY_TIMEOUT_SECONDS: ${{ vars.DEPLOY_TIMEOUT_SECONDS != '' && vars.DEPLOY_TIMEOUT_SECONDS || '900' }}
  DEPLOY_POLL_INTERVAL_SECONDS: ${{ vars.DEPLOY_POLL_INTERVAL_SECONDS != '' && vars.DEPLOY_POLL_INTERVAL_SECONDS || '15' }}

jobs:
  verify:
    name: Verify Production Deployment
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Announce deployment flow
        run: |
          echo "Frontend deployment is handled by Vercel Git integration."
          echo "Backend deployment is handled by Render auto deploy."
          echo "Verifying API health at $DEPLOY_HEALTHCHECK_URL"

      - name: Wait for Git-triggered deploys to start
        run: sleep "$DEPLOY_INITIAL_WAIT_SECONDS"

      - name: Poll API health endpoint
        run: |
          deadline=$(( $(date +%s) + DEPLOY_TIMEOUT_SECONDS ))
          while [ "$(date +%s)" -lt "$deadline" ]; do
            status_code="$(curl -sS -o /tmp/health.json -w '%{http_code}' "$DEPLOY_HEALTHCHECK_URL" || true)"
            echo "HTTP $status_code from $DEPLOY_HEALTHCHECK_URL"
            cat /tmp/health.json || true
            echo

            if [ "$status_code" = "200" ] && jq -e '.status == "ok" and .database == "ok"' /tmp/health.json >/dev/null; then
              echo "Deployment verification passed."
              exit 0
            fi

            echo "Deployment is not ready yet. Retrying in $DEPLOY_POLL_INTERVAL_SECONDS seconds."
            sleep "$DEPLOY_POLL_INTERVAL_SECONDS"
          done

          echo "Deployment verification failed: /health did not return status=ok and database=ok before timeout."
          exit 1
