name: Deployment Verification

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  DEPLOY_HEALTHCHECK_URL: ${{ vars.DEPLOY_HEALTHCHECK_URL }}
  DEPLOY_WORKER_HEALTHCHECK_URL: ${{ vars.DEPLOY_WORKER_HEALTHCHECK_URL }}
  DEPLOY_FRONTEND_URL: ${{ vars.DEPLOY_FRONTEND_URL }}
  DEPLOY_INITIAL_WAIT_SECONDS: ${{ vars.DEPLOY_INITIAL_WAIT_SECONDS }}
  DEPLOY_TIMEOUT_SECONDS: ${{ vars.DEPLOY_TIMEOUT_SECONDS }}
  DEPLOY_POLL_INTERVAL_SECONDS: ${{ vars.DEPLOY_POLL_INTERVAL_SECONDS }}

jobs:
  verify:
    name: Verify Production Deployment
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Resolve deployment settings
        run: |
          {
            echo "DEPLOY_HEALTHCHECK_URL=${DEPLOY_HEALTHCHECK_URL:-https://styleus-api.onrender.com/health}"
            echo "DEPLOY_WORKER_HEALTHCHECK_URL=${DEPLOY_WORKER_HEALTHCHECK_URL:-https://styleus-ai-worker.onrender.com/health}"
            echo "DEPLOY_FRONTEND_URL=${DEPLOY_FRONTEND_URL:-}"
            echo "DEPLOY_INITIAL_WAIT_SECONDS=${DEPLOY_INITIAL_WAIT_SECONDS:-90}"
            echo "DEPLOY_TIMEOUT_SECONDS=${DEPLOY_TIMEOUT_SECONDS:-900}"
            echo "DEPLOY_POLL_INTERVAL_SECONDS=${DEPLOY_POLL_INTERVAL_SECONDS:-15}"
          } >> "$GITHUB_ENV"

      - name: Announce deployment flow
        run: |
          echo "Frontend deployment is handled by Vercel Git integration."
          echo "Backend deployment is handled by Render auto deploy."
          echo "Verifying API health at $DEPLOY_HEALTHCHECK_URL"
          echo "Verifying worker health at $DEPLOY_WORKER_HEALTHCHECK_URL"
          if [ -n "$DEPLOY_FRONTEND_URL" ]; then
            echo "Verifying frontend availability at $DEPLOY_FRONTEND_URL"
          else
            echo "Frontend availability check skipped."
            echo "Set DEPLOY_FRONTEND_URL to enable frontend verification."
          fi

      - name: Wait for Git-triggered deploys to start
        run: sleep "$DEPLOY_INITIAL_WAIT_SECONDS"

      - name: Poll API health endpoint
        run: >-
          python scripts/ci/verify_deploy.py
          --kind api
          --url "$DEPLOY_HEALTHCHECK_URL"
          --timeout-seconds "$DEPLOY_TIMEOUT_SECONDS"
          --poll-interval-seconds "$DEPLOY_POLL_INTERVAL_SECONDS"

      - name: Poll worker health endpoint
        run: >-
          python scripts/ci/verify_deploy.py
          --kind worker
          --url "$DEPLOY_WORKER_HEALTHCHECK_URL"
          --timeout-seconds "$DEPLOY_TIMEOUT_SECONDS"
          --poll-interval-seconds "$DEPLOY_POLL_INTERVAL_SECONDS"

      - name: Poll frontend URL
        if: env.DEPLOY_FRONTEND_URL != ''
        run: >-
          python scripts/ci/verify_deploy.py
          --kind frontend
          --url "$DEPLOY_FRONTEND_URL"
          --timeout-seconds "$DEPLOY_TIMEOUT_SECONDS"
          --poll-interval-seconds "$DEPLOY_POLL_INTERVAL_SECONDS"

      - name: Frontend verification not configured
        if: env.DEPLOY_FRONTEND_URL == ''
        run: |
          echo "Frontend verification skipped."
          echo "Set repository variable DEPLOY_FRONTEND_URL to enable it."
