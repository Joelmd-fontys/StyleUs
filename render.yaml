envVarGroups:
  - name: styleus-api-shared
    envVars:
      - key: APP_ENV
        value: production
      - key: AI_ENABLE_CLASSIFIER
        value: "true"
      - key: AI_CLASSIFICATION_INPUT
        value: full
      - key: AI_MODEL_NAME
        value: ViT-B-32
      - key: AI_MODEL_PRETRAINED
        value: laion2b_s34b_b79k
      - key: AI_CONFIDENCE_THRESHOLD
        value: "0.55"
      - key: AI_ACCESSORY_CONFIDENCE_THRESHOLD
        value: "0.62"
      - key: LOCAL_AUTH_BYPASS
        value: "false"
      - key: RUN_MIGRATIONS_ON_START
        value: "true"
      - key: RUN_SEED_ON_START
        value: "false"
      - key: SUPABASE_HTTP_TIMEOUT_SECONDS
        value: "15"
  - name: styleus-worker-shared
    envVars:
      - key: APP_ENV
        value: production
      - key: AI_ENABLE_CLASSIFIER
        value: "true"
      - key: AI_CLASSIFICATION_INPUT
        value: full
      - key: AI_MODEL_NAME
        value: ViT-B-32
      - key: AI_MODEL_PRETRAINED
        value: laion2b_s34b_b79k
      - key: AI_CONFIDENCE_THRESHOLD
        value: "0.55"
      - key: AI_ACCESSORY_CONFIDENCE_THRESHOLD
        value: "0.62"
      - key: LOCAL_AUTH_BYPASS
        value: "false"
      - key: RUN_MIGRATIONS_ON_START
        value: "true"
      - key: RUN_SEED_ON_START
        value: "false"
      - key: AI_JOB_POLL_INTERVAL_SECONDS
        value: "1"
      - key: AI_JOB_MAX_ATTEMPTS
        value: "3"
      - key: AI_JOB_STALE_AFTER_SECONDS
        value: "300"
      - key: SUPABASE_HTTP_TIMEOUT_SECONDS
        value: "15"

services:
  - type: web
    name: styleus-api
    runtime: docker
    plan: starter
    rootDir: services/api
    dockerContext: .
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    preDeployCommand: python -m alembic upgrade head
    envVars:
      - fromGroup: styleus-api-shared
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_STORAGE_BUCKET
        sync: false
      - key: CORS_ORIGINS
        sync: false
  - type: web
    name: styleus-ai-worker
    runtime: docker
    plan: standard
    rootDir: services/api
    dockerContext: .
    dockerfilePath: ./Dockerfile.worker
    healthCheckPath: /health
    envVars:
      - fromGroup: styleus-worker-shared
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_STORAGE_BUCKET
        sync: false
